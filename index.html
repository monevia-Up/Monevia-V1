<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Monevia - Personal Finance</title>
  
  <style>
    /* RESET GLOBAL */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* KUNCIAN LAYAR UTAMA */
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #020617;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      overflow: hidden; 
    }

    /* BINGKAI APLIKASI */
    .app-container {
      width: 100%; height: 100%;
      background-color: #090d16; display: flex; flex-direction: column;
      margin: 0 auto; position: relative;
    }

    /* TAMPILAN LAPTOP */
    @media screen and (min-width: 601px) {
      body { padding: 2vh 0; }
      .app-container {
        max-width: 412px; height: 96vh; border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8); overflow: hidden;
      }
    }

    /* 1. HEADER */
    .header {
      flex: 0 0 auto; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
      background-color: #090d16; border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10;
    }
    
    /* 2. AREA TENGAH */
    .main-content {
      flex: 1 1 auto; overflow-y: auto; padding: 20px; padding-bottom: 60px; -webkit-overflow-scrolling: touch;
    }
    
    /* 3. NAVBAR BAWAH */
    .bottom-nav {
      flex: 0 0 auto; width: 100%; height: 70px; background-color: #020617; border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 10;
    }
    
    /* TOMBOL TAMBAH */
    .btn-add {
      width: 56px; height: 56px; background-color: #34d399; border-radius: 50%;
      display: flex; justify-content: center; align-items: center; border: none; cursor: pointer;
      box-shadow: 0 0 20px rgba(52,211,153,0.4); position: absolute; bottom: 42px; left: 50%; transform: translateX(-50%); z-index: 100;
    }
    
    .nav-item {
      background: none; border: none; color: #64748b; font-size: 11px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
    }
    .nav-item.active { color: #34d399; }
    
    /* DESAIN KARTU & MODAL */
    .balance-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.85); z-index: 999;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-box {
      width: 100%; background-color: #090d16; border-top-left-radius: 28px; border-top-right-radius: 28px;
      padding: 24px; border-top: 1px solid rgba(255,255,255,0.1);
    }
    @media screen and (min-width: 601px) {
      .modal-overlay { align-items: center; padding: 20px; }
      .modal-box { max-width: 370px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
    }
    .input-field {
      width: 100%; background-color: #0f172a; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 14px; color: white; font-size: 16px; margin-bottom: 12px; outline: none;
