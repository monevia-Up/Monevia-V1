<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monevia - Cerdas Kelola Keuangan</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone untuk compile JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-950 text-white font-sans antialiased selection:bg-emerald-500 selection:text-slate-950">

  <!-- Wadah Utama Aplikasi React -->
  <div id="root"></div>

  <!-- Script Aplikasi Berbasis React (JSX) -->
  <script type="text/babel">
    
    // SVG Icons Components to avoid external library loading bugs
    const Icons = {
      Home: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      ),
      Target: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      ),
      Plus: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      ),
      Newspaper: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
      ),
      BrainCircuit: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v3"/><path d="M12 19v3"/><path d="M22 12h-3"/><path d="M5 12H2"/><path d="m17 5-2 2"/><path d="m9 15-2 2"/><path d="m19 17-2-2"/><path d="m7 7-2-2"/><circle cx="12" cy="12" r="4"/></svg>
      ),
      X: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      ),
      Pencil: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      ),
      Trash: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      ),
      TrendingUp: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      )
    };

    function MoneviaApp() {
      
      const [currentTab, setCurrentTab] = React.useState('home');
      
      // Transaksi Awal default agar tidak kosong
      const [transactions, setTransactions] = React.useState([
        { id: 1, type: 'income', amount: 4500000, category: 'Gaji', note: 'Gaji Pokok Bulanan' },
        { id: 2, type: 'expense', amount: 250000, category: 'Makanan', note: 'Makan malam mewah' },
        { id: 3, type: 'expense', amount: 120000, category: 'Transportasi', note: 'Bensin & Tol' }
      ]);
      
      // Target Bulanan Utama (Dapat Diatur)
      const [monthlySavingsTarget, setMonthlySavingsTarget] = React.useState(10000000); // Default target saldo 10 juta
      const [tempTarget, setTempTarget] = React.useState('10000000');
      const [isTargetModalOpen, setIsTargetModalOpen] = React.useState(false);
      
      // Rencana Tabungan / Goals Finansial Khusus (Bisa Ditambah & Diisi Saldo)
      const [goals, setGoals] = React.useState([
        { id: 101, title: 'Dana Darurat Utama', targetAmount: 5000000, currentAmount: 1500000, category: 'Dana Darurat' },
        { id: 102, title: 'Ganti Laptop Kerja', targetAmount: 12000000, currentAmount: 3000000, category: 'Elektronik' }
      ]);
      
      const [isAddModalOpen, setIsAddModalOpen] = React.useState(false);
      const [isAddGoalModalOpen, setIsAddGoalModalOpen] = React.useState(false);
      const [isAddFundsModalOpen, setIsAddFundsModalOpen] = React.useState(false);
      const [selectedGoalId, setSelectedGoalId] = React.useState(null);

      // Kalkulasi Saldo Otomatis secara Dinamis
      const totalIncome = transactions.filter(t => t.type === 'income').reduce((acc, curr) => acc + curr.amount, 0);
      const totalExpense = transactions.filter(t => t.type === 'expense').reduce((acc, curr) => acc + curr.amount, 0);
      const currentBalance = totalIncome - totalExpense;

      // Format Rupiah Indonesia
      const formatIDR = (num) => {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
      };

      // Simpan Transaksi Baru
      const handleAddTransaction = (newTx) => {
        setTransactions([newTx, ...transactions]);
        setIsAddModalOpen(false);
      };

      // Simpan Target Goals Baru
      const handleAddGoal = (newGoal) => {
        setGoals([...goals, newGoal]);
        setIsAddGoalModalOpen(false);
      };

      // Update Target Tabungan Bulanan Global
      const handleSaveMonthlyTarget = (e) => {
        e.preventDefault();
        const parsed = parseInt(tempTarget, 10);
        if (!isNaN(parsed) && parsed > 0) {
          setMonthlySavingsTarget(parsed);
          setIsTargetModalOpen(false);
        }
      };

      // Tambah Saldo Tabungan ke Goals
      const handleAddGoalFunds = (goalId, amountToAdd) => {
        if (amountToAdd > currentBalance) {
          alert('Saldo Anda saat ini tidak mencukupi untuk dialokasikan ke target ini.');
          return;
        }

        // 1. Update nominal target spesifik
        setGoals(goals.map(g => {
          if (g.id === goalId) {
            return { ...g, currentAmount: g.currentAmount + amountToAdd };
          }
          return g;
        }));

        // 2. Potong saldo utama dengan mencatatnya sebagai transaksi pengeluaran alokasi tabungan
        const matchedGoal = goals.find(g => g.id === goalId);
        const autoTx = {
          id: Date.now(),
          type: 'expense',
          amount: amountToAdd,
          category: 'Tabungan',
          note: `Alokasi untuk: ${matchedGoal ? matchedGoal.title : 'Target'}`
        };
        setTransactions([autoTx, ...transactions]);
        setIsAddFundsModalOpen(false);
      };

      // Hapus Goals
      const handleDeleteGoal = (id) => {
        if (confirm('Apakah Anda yakin ingin menghapus target finansial ini?')) {
          setGoals(goals.filter(g => g.id !== id));
        }
      };

      // Hitung persentase target saldo bulanan
      const targetPercent = Math.min(Math.round((currentBalance / monthlySavingsTarget) * 100), 100);

      return (
        <div className="min-h-screen pb-24 md:pb-12 flex flex-col bg-gradient-to-br from-slate-950 to-[#0c1322]">
          
          {/* Header */}
          <header className="h-20 bg-slate-950/80 backdrop-blur-md border-b border-white/5 flex items-center justify-between px-6 sticky top-0 z-40">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-teal-600 flex items-center justify-center shadow-lg shadow-emerald-500/10">
                <Icons.BrainCircuit />
              </div>
              <div>
                <h1 className="font-bold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-teal-400">Monevia</h1>
                <p className="text-[9px] text-emerald-400/80 tracking-widest uppercase">Target & Saving Hub</p>
              </div>
            </div>
            
            <button 
              onClick={() => setIsAddModalOpen(true)}
              className="flex items-center gap-2 bg-gradient-to-r from-emerald-400 to-teal-500 text-slate-950 font-bold px-4 py-2.5 rounded-xl hover:brightness-110 active:scale-95 transition-all text-sm shadow-md shadow-emerald-400/20"
            >
              <Icons.Plus />
              <span>Catat Transaksi</span>
            </button>
          </header>

          {/* Main Content Area */}
          <main className="flex-1 p-4 md:p-6 max-w-4xl w-full mx-auto overflow-y-auto scrollbar-hide">
            
            {/* TAB 1: DASHBOARD */}
            {currentTab === 'home' && (
              <div className="space-y-6">
                
                {/* Card Ringkasan Saldo & Target Dinamis */}
                <div className="bg-gradient-to-br from-slate-900 to-slate-800/80 border border-white/10 rounded-3xl p-6 relative overflow-hidden shadow-2xl">
                  <div className="absolute -right-10 -top-10 w-40 h-40 bg-emerald-500/10 rounded-full blur-3xl"></div>
                  
                  <div className="flex justify-between items-start">
                    <div>
                      <p className="text-slate-400 text-sm font-medium">Total Saldo Terkumpul</p>
                      <h2 className="text-3xl md:text-4xl font-extrabold text-white mt-2 tracking-tight">
                        {formatIDR(currentBalance)}
                      </h2>
                    </div>
                    
                    {/* Mengatur Target Bulanan */}
                    <button 
                      onClick={() => {
                        setTempTarget(monthlySavingsTarget.toString());
                        setIsTargetModalOpen(true);
                      }}
                      className="flex items-center gap-1.5 bg-white/10 hover:bg-white/15 px-3 py-1.5 rounded-lg text-xs font-semibold text-emerald-400 border border-white/5 transition-colors"
                    >
                      <Icons.Pencil />
                      <span>Atur Target</span>
                    </button>
                  </div>
                  
                  {/* Progress Target Bulanan */}
                  <div className="mt-8 space-y-2">
                    <div class="flex justify-between items-end text-xs">
                      <span className="text-slate-400 font-medium">Target Saldo Bulanan: <strong className="text-emerald-300">{formatIDR(monthlySavingsTarget)}</strong></span>
                      <span className="text-emerald-400 font-bold text-sm">{targetPercent}%</span>
                    </div>
                    
                    <div className="w-full bg-slate-950/80 h-3 rounded-full overflow-hidden p-[2px] border border-white/5">
                      <div 
                        className="bg-gradient-to-r from-emerald-400 to-teal-500 h-full rounded-full transition-all duration-500"
                        style={{ width: `${targetPercent}%` }}
                      ></div>
                    </div>
                    <p className="text-[11px] text-slate-500 italic">
                      {targetPercent >= 100 ? "🎉 Selamat! Target saldo bulanan Anda telah tercapai!" : `Kurang ${formatIDR(Math.max(0, monthlySavingsTarget - currentBalance))} lagi untuk mencapai target.`}
                    </p>
                  </div>

                  <div className="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-white/5">
                    <div className="bg-slate-950/40 p-3 rounded-2xl border border-white/5">
                      <p className="text-slate-400 text-xs">Pemasukan Hari Ini</p>
                      <p className="text-emerald-400 font-bold text-base mt-1">{formatIDR(totalIncome)}</p>
                    </div>
                    <div className="bg-slate-950/40 p-3 rounded-2xl border border-white/5">
                      <p className="text-slate-400 text-xs">Pengeluaran & Tabungan</p>
                      <p className="text-rose-400 font-bold text-base mt-1">{formatIDR(totalExpense)}</p>
                    </div>
                  </div>
                </div>

                {/* Riwayat Transaksi */}
                <div className="space-y-3">
                  <div className="flex justify-between items-center">
                    <h3 className="font-bold text-lg text-white/90">Transaksi Terkini</h3>
                    <span className="text-xs text-slate-500">{transactions.length} tercatat</span>
                  </div>

                  {transactions.length === 0 ? (
                    <div className="p-10 text-center border-2 border-dashed border-white/5 rounded-3xl text-slate-500 text-sm">
                      Belum ada catatan aktivitas keuangan masuk atau keluar.
                    </div>
                  ) : (
                    <div className="space-y-2.5">
                      {transactions.map(tx => (
                        <div key={tx.id} className="flex items-center justify-between p-4 bg-slate-900/40 border border-white/5 rounded-2xl hover:bg-slate-900/70 transition-colors">
                          <div className="flex items-center gap-3">
                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-xs ${tx.type === 'income' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`}>
                              {tx.type === 'income' ? 'IN' : 'OUT'}
                            </div>
                            <div>
                              <p className="font-semibold text-sm text-white">{tx.category}</p>
                              <p className="text-xs text-slate-400 mt-0.5">{tx.note || 'Tanpa catatan'}</p>
                            </div>
                          </div>
                          <div className="text-right">
                            <p className={`font-bold text-sm ${tx.type === 'income' ? 'text-emerald-400' : 'text-slate-100'}`}>
                              {tx.type === 'income' ? '+' : '-'}{formatIDR(tx.amount)}
                            </p>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* TAB 2: TARGET / GOALS TABUNGAN */}
            {currentTab === 'target' && (
              <div className="space-y-6">
                
                {/* Heading & Button Add Target */}
                <div className="flex justify-between items-center">
                  <div>
                    <h2 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-teal-400">Target Impian Anda</h2>
                    <p className="text-xs text-slate-400 mt-1">Buat, simpan, dan kelola target finansial khusus Anda.</p>
                  </div>
                  <button 
                    onClick={() => setIsAddGoalModalOpen(true)}
                    className="flex items-center gap-1.5 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 px-3.5 py-2 rounded-xl text-sm font-semibold transition-all"
                  >
                    <Icons.Plus />
                    <span>Target Baru</span>
                  </button>
                </div>

                {/* Grid Target Cards */}
                {goals.length === 0 ? (
                  <div className="p-12 text-center border-2 border-dashed border-white/5 rounded-3xl text-slate-500">
                    <p className="text-sm">Anda belum memiliki target impian.</p>
                    <button 
                      onClick={() => setIsAddGoalModalOpen(true)}
                      className="mt-4 text-xs font-bold text-emerald-400 underline"
                    >
                      Mulai Bikin Target Baru
                    </button>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {goals.map(goal => {
                      const percent = Math.min(Math.round((goal.currentAmount / goal.targetAmount) * 100), 100);
                      return (
                        <div key={goal.id} className="bg-slate-900/50 border border-white/5 p-5 rounded-3xl flex flex-col justify-between space-y-4 hover:border-emerald-500/30 transition-all">
                          <div>
                            <div className="flex justify-between items-start">
                              <span className="text-[10px] bg-slate-800 text-emerald-400 px-2.5 py-1 rounded-full font-bold uppercase tracking-wider">{goal.category}</span>
                              <button 
                                onClick={() => handleDeleteGoal(goal.id)}
                                className="text-slate-500 hover:text-rose-400 p-1 rounded-lg transition-colors"
                              >
                                <Icons.Trash />
                              </button>
                            </div>
                            
                            <h3 className="font-bold text-base text-white mt-3">{goal.title}</h3>
                            
                            <div className="flex justify-between items-end mt-4 text-xs">
                              <div>
                                <p className="text-slate-400 text-[10px]">Terkumpul</p>
                                <p className="font-bold text-emerald-400">{formatIDR(goal.currentAmount)}</p>
                              </div>
                              <div className="text-right">
                                <p className="text-slate-400 text-[10px]">Target Sasaran</p>
                                <p className="font-bold text-white">{formatIDR(goal.targetAmount)}</p>
                              </div>
                            </div>
                          </div>

                          {/* Progress bar */}
                          <div className="space-y-2">
                            <div className="w-full bg-slate-950 h-2.5 rounded-full overflow-hidden p-[1px] border border-white/5">
                              <div 
                                className="bg-gradient-to-r from-emerald-400 to-teal-400 h-full rounded-full transition-all" 
                                style={{ width: `${percent}%` }}
                              ></div>
                            </div>
                            <div className="flex justify-between items-center text-[10px] text-slate-400">
                              <span>Kemajuan tabungan</span>
                              <span class="font-bold text-emerald-400">{percent}%</span>
                            </div>
                          </div>

                          {/* Action Button: Nabung ke target */}
                          <button 
                            onClick={() => {
                              setSelectedGoalId(goal.id);
                              setIsAddFundsModalOpen(true);
                            }}
                            className="w-full py-2.5 bg-slate-950 hover:bg-slate-900 border border-emerald-500/20 text-emerald-400 rounded-xl font-bold text-xs transition-colors"
                          >
                            Isi Saldo Target ini
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* TAB 3: EDUKASI */}
            {currentTab === 'edu' && (
              <div className="space-y-6">
                <div>
                  <h2 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-teal-400">Pusat Edukasi Finansial</h2>
                  <p className="text-xs text-slate-400 mt-1">Dapatkan wawasan keuangan serta rekomendasi video terbaik.</p>
                </div>

                {/* Video Rekomendasi Terpilih (Sesuai Permintaan) */}
                <div className="bg-slate-900/60 border border-white/5 rounded-3xl p-5 space-y-4">
                  <div className="flex items-center gap-2">
                    <span className="bg-rose-500/20 text-rose-400 text-[10px] font-extrabold px-2.5 py-1 rounded-full uppercase tracking-wider">
                      REKOMENDASI VIDEO TERPILIH ⭐
                    </span>
                  </div>
                  
                  <h3 className="font-bold text-base text-white">Panduan & Cara Kelola Keuangan Pribadi Secara Bijak</h3>
                  
                  {/* Youtube Embed Container */}
                  <div className="relative w-full aspect-video rounded-2xl overflow-hidden border border-white/10 shadow-lg">
                    <iframe 
                      className="absolute top-0 left-0 w-full h-full"
                      src="https://www.youtube.com/embed/Eg4I7PuyiMY" 
                      title="Rekomendasi Video Edukasi Finansial Monevia" 
                      frameBorder="0" 
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                      allowFullScreen
                    ></iframe>
                  </div>
                  <p className="text-xs text-slate-400 leading-relaxed">
                    Tonton video panduan finansial di atas untuk memahami dasar-dasar mengalokasikan pendapatan, menetapkan target keuangan bulanan, dan cara mencapai kebebasan finansial secara efektif.
                  </p>
                </div>

                {/* Berita Hot Finansial Lainnya */}
                <div className="space-y-3">
                  <h3 className="font-bold text-sm text-slate-400 tracking-wider uppercase">Artikel Populer</h3>
                  
                  <a href="https://www.cnbcindonesia.com/market" target="_blank" className="block p-5 bg-slate-900/30 rounded-2xl border border-white/5 hover:border-emerald-500/30 transition-all">
                    <span className="text-[10px] bg-red-500 text-white font-bold px-2.5 py-0.5 rounded mr-2">HOT 🔥</span>
                    <h4 className="font-bold text-sm mt-3 text-white">IHSG Bergerak Volatil Menjelang Penutupan Pasar Finansial Global</h4>
                    <p className="text-xs text-slate-400 mt-2">Klik untuk membaca analisis pergerakan saham dan kondisi pasar modal terkini di CNBC Market...</p>
                  </a>
                </div>
              </div>
            )}
          </main>

          {/* Bottom Mobile Navigation */}
          <nav className="fixed bottom-0 left-0 right-0 h-18 bg-slate-950/90 backdrop-blur-md border-t border-white/5 flex items-center justify-around px-6 z-40 pb-safe">
            <button 
              onClick={() => setCurrentTab('home')} 
              className={`flex flex-col items-center gap-1.5 transition-colors ${currentTab === 'home' ? 'text-emerald-400' : 'text-slate-400 hover:text-white'}`}
            >
              <Icons.Home />
              <span className="text-[10px] font-medium">Dashboard</span>
            </button>
            
            <button 
              onClick={() => setCurrentTab('target')} 
              className={`flex flex-col items-center gap-1.5 transition-colors ${currentTab === 'target' ? 'text-emerald-400' : 'text-slate-400 hover:text-white'}`}
            >
              <Icons.Target />
              <span class="text-[10px] font-medium">Target</span>
            </button>
            
            <button 
              onClick={() => setCurrentTab('edu')} 
              className={`flex flex-col items-center gap-1.5 transition-colors ${currentTab === 'edu' ? 'text-emerald-400' : 'text-slate-400 hover:text-white'}`}
            >
              <Icons.Newspaper />
              <span className="text-[10px] font-medium">Edukasi</span>
            </button>
          </nav>

          {/* MODAL 1: ATUR TARGET BULANAN GLOBAL */}
          {isTargetModalOpen && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-white/10 w-full max-w-sm rounded-3xl p-6 space-y-4">
                <div className="flex justify-between items-center">
                  <h3 className="font-bold text-base">Atur Target Saldo Bulanan</h3>
                  <button onClick={() => setIsTargetModalOpen(false)} className="text-slate-400 hover:text-white">
                    <Icons.X />
                  </button>
                </div>
                
                <form onSubmit={handleSaveMonthlyTarget} className="space-y-4">
                  <div>
                    <label className="text-xs text-slate-400 block mb-2">Target Nominal (Rp)</label>
                    <input 
                      type="number" 
                      value={tempTarget} 
                      onChange={(e) => setTempTarget(e.target.value)}
                      placeholder="Contoh: 10000000" 
                      className="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-emerald-400"
                      required
                    />
                  </div>
                  
                  <div className="flex gap-2">
                    <button 
                      type="button" 
                      onClick={() => setIsTargetModalOpen(false)} 
                      className="flex-1 py-3 bg-slate-950 text-slate-400 hover:text-white rounded-xl text-xs font-semibold"
                    >
                      Batal
                    </button>
                    <button 
                      type="submit" 
                      className="flex-1 py-3 bg-gradient-to-r from-emerald-400 to-teal-500 text-slate-950 font-bold rounded-xl text-xs"
                    >
                      Simpan
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* MODAL 2: CATAT TRANSAKSI BARU */}
          {isAddModalOpen && (
            <AddTransactionModal onClose={() => setIsAddModalOpen(false)} onSave={handleAddTransaction} />
          )}

          {/* MODAL 3: BUAT TARGET IMPIAN BARU */}
          {isAddGoalModalOpen && (
            <AddGoalModal onClose={() => setIsAddGoalModalOpen(false)} onSave={handleAddGoal} />
          )}

          {/* MODAL 4: MASUKKAN SALDO KE TARGET IMPIAN */}
          {isAddFundsModalOpen && (
            <AddFundsModal 
              onClose={() => setIsAddFundsModalOpen(false)} 
              onSave={(amount) => handleAddGoalFunds(selectedGoalId, amount)} 
              maxAllowed={currentBalance}
            />
          )}

        </div>
      );
    }

    
    // Modal Tambah Transaksi Sub-Component
    function AddTransactionModal({ onClose, onSave }) {
      const [type, setType] = React.useState('expense');
      const [amount, setAmount] = React.useState('');
      const [category, setCategory] = React.useState('Makanan');
      const [note, setNote] = React.useState('');

      const quickAmounts = [10000, 20000, 50000, 100000];

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!amount || isNaN(parseInt(amount))) return;
        onSave({
          id: Date.now(),
          type,
          amount: parseInt(amount, 10),
          category,
          note
        });
      };

      return (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4">
          <div className="bg-slate-900 border border-white/10 w-full max-w-md rounded-t-3xl md:rounded-3xl p-6 space-y-5">
            <div className="flex justify-between items-center">
              <h3 className="font-bold text-base">Catat Transaksi Baru</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white">
                <Icons.X />
              </button>
            </div>

            {/* Toggle Tipe */}
            <div className="flex bg-slate-950 p-1 rounded-xl border border-white/5">
              <button type="button" onClick={() => { setType('expense'); setCategory('Makanan'); }} className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-all ${type === 'expense' ? 'bg-rose-500/20 text-rose-400' : 'text-slate-400'}`}>Pengeluaran</button>
              <button type="button" onClick={() => { setType('income'); setCategory('Gaji'); }} className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-all ${type === 'income' ? 'bg-emerald-500/20 text-emerald-400' : 'text-slate-400'}`}>Pemasukan</button>
            </div>

            {/* Input Nominal */}
            <div>
              <label className="text-[10px] text-slate-400 block mb-1.5 uppercase font-semibold">Nominal (Rp)</label>
              <input 
                type="number" 
                value={amount} 
                onChange={(e) => setAmount(e.target.value)}
                placeholder="Masukkan jumlah (Contoh: 50000)" 
                className="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-emerald-400"
                required
              />
              {/* Tombol Cepat Ribuan */}
              <div className="grid grid-cols-4 gap-2 mt-2">
                {quickAmounts.map(val => (
                  <button key={val} type="button" onClick={() => setAmount(val)} className="bg-slate-950 hover:bg-slate-800 border border-white/5 text-slate-300 text-[10px] py-2 rounded-lg font-bold">
                    +{val/1000}k
                  </button>
                ))}
              </div>
            </div>

            {/* Kategori */}
            <div>
              <label className="text-[10px] text-slate-400 block mb-1.5 uppercase font-semibold">Kategori</label>
              <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-white text-sm outline-none">
                {type === 'expense' ? (
                  <>
                    <option value="Makanan">Makanan</option>
                    <option value="Transportasi">Transportasi</option>
                    <option value="Nongkrong">Nongkrong</option>
                    <option value="Belanja">Belanja</option>
                    <option value="Lainnya">Lainnya</option>
                  </>
                ) : (
                  <>
                    <option value="Gaji">Gaji</option>
                    <option value="Freelance">Freelance</option>
                    <option value="Bisnis">Bisnis</option>
                  </>
                )}
              </select>
            </div>

            <input 
              type="text" 
              placeholder="Catatan kecil (opsional)" 
              value={note} 
              onChange={(e) => setNote(e.target.value)} 
              className="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-sm text-white outline-none"
            />

            <button onClick={handleSubmit} className="w-full bg-gradient-to-r from-emerald-400 to-teal-500 text-slate-950 font-bold py-3.5 rounded-xl hover:brightness-110 active:scale-95 transition-all text-sm shadow-lg">
              Simpan Transaksi
            </button>
          </div>
        </div>
      );
    }

    // Modal Tambah Target Impian Baru (Add Goal)
    function AddGoalModal({ onClose, onSave }) {
      const [title, setTitle] = React.useState('');
      const [targetAmount, setTargetAmount] = React.useState('');
      const [category, setCategory] = React.useState('Gadget');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!title || !targetAmount) return;
        onSave({
          id: Date.now(),
          title,
          targetAmount: parseInt(targetAmount, 10),
          currentAmount: 0,
          category
        });
      };

      return (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-slate-900 border border-white/10 w-full max-w-sm rounded-3xl p-6 space-y-4">
            <div className="flex justify-between items-center">
              <h3 className="font-bold text-base">Buat Target Baru</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white">
                <Icons.X />
              </button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="text-[10px] text-slate-400 block mb-1">Nama Target</label>
                <input 
                  type="text" 
                  value={title} 
                  onChange={(e) => setTitle(e.target.value)}
                  placeholder="Contoh: Beli iPhone 15" 
                  className="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-white text-xs outline-none focus:border-emerald-400"
                  required
                />
              </div>

              <div>
                <label className="text-[10px] text-slate-400 block mb-1">Target Nominal (Rp)</label>
                <input 
                  type="number" 
                  value={targetAmount} 
                  onChange={(e) => setTargetAmount(e.target.value)}
                  placeholder="Contoh: 15000000" 
                  className="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-white text-xs outline-none focus:border-emerald-400"
                  required
                />
              </div>

              <div>
                <label className="text-[10px] text-slate-400 block mb-1">Kategori Target</label>
                <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-white text-xs outline-none">
                  <option value="Gadget">Gadget & Elektronik</option>
                  <option value="Liburan">Liburan</option>
                  <option value="Kendaraan">Kendaraan</option>
                  <option value="Dana Darurat">Dana Darurat</option>
                  <option value="Lainnya">Lainnya</option>
                </select>
              </div>

              <button type="submit" className="w-full bg-gradient-to-r from-emerald-400 to-teal-500 text-slate-950 font-bold py-3 rounded-xl text-xs">
                Buat Target
              </button>
            </form>
          </div>
        </div>
      );
    }

    // Modal Isi Tabungan untuk Target Khusus (Add Funds to Goal)
    function AddFundsModal({ onClose, onSave, maxAllowed }) {
      const [amount, setAmount] = React.useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        const parsed = parseInt(amount, 10);
        if (!amount || isNaN(parsed) || parsed <= 0) return;
        onSave(parsed);
      };

      return (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-slate-900 border border-white/10 w-full max-w-sm rounded-3xl p-6 space-y-4">
            <div className="flex justify-between items-center">
              <h3 className="font-bold text-base">Nabung untuk Target Ini</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white">
                <Icons.X />
              </button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="text-[10px] text-slate-400 block mb-1">Nominal yang ditabung (Rp)</label>
                <input 
                  type="number" 
                  value={amount} 
                  onChange={(e) => setAmount(e.target.value)}
                  placeholder="Contoh: 500000" 
                  className="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-white text-xs outline-none focus:border-emerald-400"
                  max={maxAllowed}
                  required
                />
                <span className="text-[10px] text-slate-500 mt-1 block">Maksimal tabungan saat ini: <strong className="text-emerald-400">{new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(maxAllowed)}</strong></span>
              </div>

              <button type="submit" className="w-full bg-gradient-to-r from-emerald-400 to-teal-500 text-slate-950 font-bold py-3 rounded-xl text-xs">
                Konfirmasi Tabungan
              </button>
            </form>
          </div>
        </div>
      );
    }

    
    // Inisialisasi dan Render dengan ReactDOM yang benar (Bukan revolutionaryReactDOM)
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<MoneviaApp />);
  </script>
</body>
</html>
