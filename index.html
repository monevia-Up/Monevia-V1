<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Throne Notes - Planning & Calendar</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Fredoka untuk tampilan imut & Playfair/Cinzel style -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Fredoka', 'sans-serif'],
          },
          colors: {
            got: {
              stark: '#94a3b8',
              targaryen: '#f43f5e',
              lannister: '#fbbf24',
              night: '#0f172a',
              card: '#1e293b',
              pastelRed: '#fda4af',
              pastelGold: '#fef08a'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-got-night text-slate-100 min-h-screen font-sans p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-6">

    <!-- Header Lucu -->
    <header class="text-center bg-got-card border-4 border-slate-700 rounded-3xl p-6 shadow-xl relative overflow-hidden">
      <div class="absolute -top-2 -left-2 text-3xl">🐉</div>
      <div class="absolute -top-2 -right-2 text-3xl">🐺</div>
      <h1 class="text-3xl md:text-4xl font-extrabold text-amber-300 tracking-wide flex items-center justify-center gap-2">
        👑 Cute Throne Notes ⚔️
      </h1>
      <p class="text-xs md:text-sm text-slate-400 mt-1">"Winter is Coming...! ✨"</p>
    </header>

    <!-- Layout Utama: Kalender & Planning -->
    <div class="grid grid-cols-1 md:grid-cols-12 gap-6">

      <!-- Kolom Kiri: Kalender Lucu GoT (5 Cols) -->
      <div class="md:col-span-5 bg-got-card border-2 border-slate-700 rounded-3xl p-5 shadow-lg space-y-4">
        <div class="flex justify-between items-center pb-2 border-b border-slate-700">
          <button onclick="changeMonth(-1)" class="bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-xl text-lg font-bold">◄</button>
          <h2 id="calendar-month" class="font-bold text-amber-300 text-sm md:text-base">Juli 2026</h2>
          <button onclick="changeMonth(1)" class="bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-xl text-lg font-bold">►</button>
        </div>

        <!-- Hari dalam Seminggu -->
        <div class="grid grid-cols-7 gap-1 text-center font-bold text-xs text-slate-400">
          <div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
        </div>

        <!-- Grid Tanggal -->
        <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center text-xs">
          <!-- Di-render oleh JavaScript -->
        </div>

        <div class="bg-slate-900/60 p-3 rounded-2xl border border-slate-800 text-center">
          <p class="text-xs text-rose-300 font-medium" id="selected-date-text">📅 Klik tanggal untuk melihat/membuat plan!</p>
        </div>
      </div>

      <!-- Kolom Kanan: Planning & Quest/To-Do (7 Cols) -->
      <div class="md:col-span-7 space-y-6">

        <!-- Form Input Plan Baru (Quest) -->
        <div class="bg-got-card border-2 border-slate-700 rounded-3xl p-5 shadow-lg space-y-3">
          <h3 class="font-bold text-slate-200 text-sm flex items-center gap-2">
            🛡️ Tambah Misi / Planning Baru
          </h3>
          <form id="form-plan" class="space-y-3">
            <div class="flex gap-2">
              <input type="text" id="input-plan" placeholder="Contoh: Taklukkan Tugas Sosiologi... 🔥" required class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-amber-400 text-white">
              <select id="select-house" class="bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-xs text-white">
                <option value="🐺 Stark">🐺 Stark</option>
                <option value="🐉 Targaryen">🐉 Targaryen</option>
                <option value="🦁 Lannister">🦁 Lannister</option>
              </select>
            </div>
            <button type="submit" class="w-full py-2.5 bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold rounded-xl text-xs transition">
              + Rebut Tahta (Simpan Plan)
            </button>
          </form>
        </div>

        <!-- Daftar Planning untuk Tanggal Terpilih -->
        <div class="bg-got-card border-2 border-slate-700 rounded-3xl p-5 shadow-lg space-y-3">
          <div class="flex justify-between items-center border-b border-slate-700 pb-2">
            <h3 class="font-bold text-amber-300 text-xs md:text-sm">⚔️ Daftar Misi Hari Ini</h3>
            <span id="plan-count" class="bg-slate-800 text-slate-400 text-[10px] px-2 py-0.5 rounded-full">0 Misi</span>
          </div>

          <div id="plan-list" class="space-y-2 max-h-60 overflow-y-auto pr-1">
            <!-- Items di-render via JS -->
          </div>
        </div>

      </div>

    </div>

    <!-- Catatan Rahasia (Scrolls of Wisdom) -->
    <div class="bg-got-card border-2 border-slate-700 rounded-3xl p-5 shadow-lg space-y-3">
      <h3 class="font-bold text-rose-400 text-sm flex items-center gap-2">
        📜 Gulungan Catatan Bebas (Quick Notes)
      </h3>
      <textarea id="quick-notes" rows="4" placeholder="Tulis ide strategi, draf novel, atau catatan penting lainnya di sini..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-3 text-xs text-slate-200 focus:outline-none focus:border-rose-400"></textarea>
      <div class="text-right">
        <button onclick="saveNotes()" class="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl text-xs transition">
          💾 Simpan Gulungan
        </button>
      </div>
    </div>

  </div>

  <script>
    // State Aplikasi
    let currentDate = new Date();
    let selectedDateStr = new Date().toISOString().split('T')[0];
    let plans = JSON.parse(localStorage.getItem('got_plans')) || {};
    let notes = localStorage.getItem('got_quick_notes') || '';

    const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

    // Render Kalender
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('calendar-month').innerText = `${namaBulan[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const daysContainer = document.getElementById('calendar-days');
      daysContainer.innerHTML = '';

      // Blank slots
      for (let i = 0; i < firstDay; i++) {
        daysContainer.innerHTML += `<div></div>`;
      }

      // Day slots
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isSelected = dateStr === selectedDateStr;
        const hasPlan = plans[dateStr] && plans[dateStr].length > 0;

        let bgClass = isSelected ? 'bg-amber-400 text-slate-950 font-bold' : 'hover:bg-slate-800 text-slate-300';
        
        daysContainer.innerHTML += `
          <button onclick="selectDate('${dateStr}')" class="p-2 rounded-xl text-xs relative ${bgClass} transition">
            ${day}
            ${hasPlan && !isSelected ? '<span class="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-rose-400 rounded-full"></span>' : ''}
          </button>
        `;
      }
    }

    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      renderCalendar();
    }

    function selectDate(dateStr) {
      selectedDateStr = dateStr;
      document.getElementById('selected-date-text').innerText = `📅 Tanggal Terpilih: ${dateStr}`;
      renderCalendar();
      renderPlans();
    }

    // Render Daftar Plan
    function renderPlans() {
      const planList = document.getElementById('plan-list');
      const dayPlans = plans[selectedDateStr] || [];
      document.getElementById('plan-count').innerText = `${dayPlans.length} Misi`;

      planList.innerHTML = '';

      if (dayPlans.length === 0) {
        planList.innerHTML = `<p class="text-center text-xs text-slate-500 py-4 italic">Belum ada misi untuk tanggal ini 🛡️</p>`;
        return;
      }

      dayPlans.forEach((plan, index) => {
        planList.innerHTML += `
          <div class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-800 rounded-xl text-xs">
            <div class="flex items-center gap-2">
              <input type="checkbox" ${plan.done ? 'checked' : ''} onchange="togglePlan(${index})" class="accent-amber-400 w-4 h-4 rounded cursor-pointer">
              <span class="${plan.done ? 'line-through text-slate-500' : 'text-slate-200'} font-medium">
                <span class="text-[10px] opacity-75 mr-1">${plan.house}</span> ${plan.text}
              </span>
            </div>
            <button onclick="deletePlan(${index})" class="text-rose-400 hover:text-rose-300 font-bold px-1">✕</button>
          </div>
        `;
      });
    }

    // Form Event Listener
    document.getElementById('form-plan').addEventListener('submit', function(e) {
      e.preventDefault();
      const text = document.getElementById('input-plan').value;
      const house = document.getElementById('select-house').value;

      if (!plans[selectedDateStr]) plans[selectedDateStr] = [];
      plans[selectedDateStr].push({ text, house, done: false });

      localStorage.setItem('got_plans', JSON.stringify(plans));
      document.getElementById('input-plan').value = '';
      
      renderCalendar();
      renderPlans();
    });

    function togglePlan(index) {
      plans[selectedDateStr][index].done = !plans[selectedDateStr][index].done;
      localStorage.setItem('got_plans', JSON.stringify(plans));
      renderPlans();
    }

    function deletePlan(index) {
      plans[selectedDateStr].splice(index, 1);
      localStorage.setItem('got_plans', JSON.stringify(plans));
      renderCalendar();
      renderPlans();
    }

    // Quick Notes
    function saveNotes() {
      const val = document.getElementById('quick-notes').value;
      localStorage.setItem('got_quick_notes', val);
      alert('📜 Gulungan Catatan Berhasil Disimpan!');
    }

    // Init App
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('quick-notes').value = notes;
      selectDate(selectedDateStr);
    });
  </script>
</body>
</html>
