<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1,h2{
text-align:center;
}

.section{
margin-top:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.task{
display:flex;
align-items:center;
margin:8px 0;
}

.task input[type=text]{
margin-left:10px;
}

footer{
text-align:center;
margin-top:20px;
color:gray;
}
</style>

</head>
<body>

<div class="container">

<h1>📅 Daily Planner</h1>

<div class="section">
<h2>Hari Ini</h2>
<input type="date" id="date">
</div>

<div class="section">
<h2>🎯 Top 3 Prioritas</h2>

<input id="p1" placeholder="Prioritas 1">
<input id="p2" placeholder="Prioritas 2">
<input id="p3" placeholder="Prioritas 3">
</div>

<div class="section">
<h2>✅ To Do List</h2>

<div class="task"><input type="checkbox"><input placeholder="Task 1"></div>
<div class="task"><input type="checkbox"><input placeholder="Task 2"></div>
<div class="task"><input type="checkbox"><input placeholder="Task 3"></div>
<div class="task"><input type="checkbox"><input placeholder="Task 4"></div>
<div class="task"><input type="checkbox"><input placeholder="Task 5"></div>

</div>

<div class="section">
<h2>💧 Water Tracker</h2>

<label><input type="checkbox">1</label>
<label><input type="checkbox">2</label>
<label><input type="checkbox">3</label>
<label><input type="checkbox">4</label>
<label><input type="checkbox">5</label>
<label><input type="checkbox">6</label>
<label><input type="checkbox">7</label>
<label><input type="checkbox">8</label>

</div>

<div class="section">
<h2>😊 Mood</h2>

<select>
<option>😁 Sangat Senang</option>
<option>😊 Senang</option>
<option>😐 Biasa</option>
<option>😔 Sedih</option>
<option>😫 Capek</option>
</select>

</div>

<div class="section">
<h2>📝 Catatan</h2>

<textarea rows="6" placeholder="Tulis catatan hari ini..."></textarea>

</div>

<button onclick="save()">💾 Simpan Planner</button>

<footer>
Daily Planner sederhana ❤️
</footer>

</div>

<script>

document.getElementById("date").valueAsDate=new Date();

function save(){

localStorage.setItem("planner",document.body.innerHTML);

alert("Planner berhasil disimpan!");

}

</script>

</body>
</html>
