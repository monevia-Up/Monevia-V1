<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catatan Keuangan Harian</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

  <div class="max-w-2xl mx-auto space-y-6">
    
    <!-- Header -->
    <div class="text-center space-y-1">
      <h1 class="text-2xl font-bold text-white">Dompet Harian</h1>
      <p class="text-xs text-slate-400">Pemasukan, Pengeluaran, Tabungan & Investasi</p>
    </div>

    <!-- Ringkasan Saldo -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg">
      <div class="text-center pb-4 border-b border-slate-800">
        <p class="text-xs text-slate-400 uppercase tracking-wider font-medium">Sisa Uang / Total Saldo</p>
        <h2 id="total-saldo" class="text-3xl font-extrabold text-white mt-1">Rp 0</h2>
      </div>

      <!-- Detail Kategori (Pemasukan, Pengeluaran, Tabungan, Investasi) -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4 text-center">
        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">
          <p class="text-[11px] text-slate-400">Pemasukan</p>
          <p id="total-pemasukan" class="text-sm font-bold text-emerald-400 mt-0.5">Rp 0</p>
        </div>
        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">
          <p class="text-[11px] text-slate-400">Pengeluaran</p>
          <p id="total-pengeluaran" class="text-sm font-bold text-rose-400 mt-0.5">Rp 0</p>
        </div>
        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">
          <p class="text-[11px] text-slate-400">Tabungan</p>
          <p id="total-tabungan" class="text-sm font-bold text-blue-400 mt-0.5">Rp 0</p>
        </div>
        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">
          <p class="text-[11px] text-slate-400">Investasi</p>
          <p id="total-investasi" class="text-sm font-bold text-purple-400 mt-0.5">Rp 0</p>
        </div>
      </div>
    </div>

    <!-- Form Input Transaksi -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 space-y-4">
      <h3 class="font-semibold text-sm text-slate-200">Tambah Transaksi Baru</h3>
      
      <form id="form-transaksi" class="space-y-3">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-slate-400 mb-1">Jenis Transaksi</label>
            <select id="jenis" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-blue-500">
              <option value="pemasukan">🟢 Pemasukan (Gaji / Uang Saku)</option>
              <option value="pengeluaran">🔴 Pengeluaran / Jajan Harian</option>
              <option value="tabungan">🔵 Masuk Tabungan</option>
              <option value="investasi">🟣 Masuk Investasi</option>
            </select>
          </div>

          <div>
            <label class="block text-xs text-slate-400 mb-1">Jumlah Uang (Rp)</label>
            <input type="number" id="jumlah" placeholder="Contoh: 50000" min="1" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-blue-500">
          </div>
        </div>

        <div>
          <label class="block text-xs text-slate-400 mb-1">Keterangan / Catatan</label>
          <input type="text" id="catatan" placeholder="Contoh: Beli Makan Siang / Sisihan Tabungan" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-blue-500">
        </div>

        <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-sm transition">
          Simpan Catatan
        </button>
      </form>
    </div>

    <!-- Tabel Riwayat Transaksi -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 space-y-3">
      <div class="flex justify-between items-center">
        <h3 class="font-semibold text-sm text-slate-200">Riwayat Transaksi</h3>
        <button onclick="resetSemuaData()" class="text-xs text-rose-400 hover:underline">Hapus Semua Data</button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="text-xs text-slate-400 border-b border-slate-800 uppercase bg-slate-950">
            <tr>
              <th class="p-3">Jenis</th>
              <th class="p-3">Keterangan</th>
              <th class="p-3 text-right">Jumlah</th>
              <th class="p-3 text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="tabel-riwayat" class="divide-y divide-slate-800 text-slate-300">
            <!-- Data dirender otomatis oleh JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // Ambil data Simpanan dari LocalStorage (jika ada)
    let dataTransaksi = JSON.parse(localStorage.getItem('dompet_harian')) || [];

    // Helper Format Rupiah
    function formatRupiah(angka) {
      return 'Rp ' + new Intl.NumberFormat('id-ID').format(angka);
    }

    // Fungsi Utama Update Tampilan & Hitungan
    function updateTampilan() {
      // Hitung total masing-masing
      let totalPemasukan = 0;
      let totalPengeluaran = 0;
      let totalTabungan = 0;
      let totalInvestasi = 0;

      dataTransaksi.forEach(item => {
        if (item.jenis === 'pemasukan') totalPemasukan += item.jumlah;
        if (item.jenis === 'pengeluaran') totalPengeluaran += item.jumlah;
        if (item.jenis === 'tabungan') totalTabungan += item.jumlah;
        if (item.jenis === 'investasi') totalInvestasi += item.jumlah;
      });

      // Sisa Saldo Bebas = Pemasukan - (Pengeluaran + Tabungan + Investasi)
      const sisaSaldo = totalPemasukan - (totalPengeluaran + totalTabungan + totalInvestasi);

      // Tampilkan ke layar
      document.getElementById('total-saldo').innerText = formatRupiah(sisaSaldo);
      document.getElementById('total-pemasukan').innerText = formatRupiah(totalPemasukan);
      document.getElementById('total-pengeluaran').innerText = formatRupiah(totalPengeluaran);
      document.getElementById('total-tabungan').innerText = formatRupiah(totalTabungan);
      document.getElementById('total-investasi').innerText = formatRupiah(totalInvestasi);

      // Render Tabel
      const tbody = document.getElementById('tabel-riwayat');
      tbody.innerHTML = '';

      if (dataTransaksi.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center py-6 text-slate-500 italic">Belum ada catatan transaksi.</td></tr>`;
      } else {
        dataTransaksi.forEach((item, index) => {
          let labelBadge = '';
          let warnaUang = '';

          if (item.jenis === 'pemasukan') {
            labelBadge = '<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-xs px-2 py-0.5 rounded-full">Pemasukan</span>';
            warnaUang = 'text-emerald-400';
          } else if (item.jenis === 'pengeluaran') {
            labelBadge = '<span class="bg-rose-500/10 text-rose-400 border border-rose-500/20 text-xs px-2 py-0.5 rounded-full">Pengeluaran</span>';
            warnaUang = 'text-rose-400';
          } else if (item.jenis === 'tabungan') {
            labelBadge = '<span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-xs px-2 py-0.5 rounded-full">Tabungan</span>';
            warnaUang = 'text-blue-400';
          } else if (item.jenis === 'investasi') {
            labelBadge = '<span class="bg-purple-500/10 text-purple-400 border border-purple-500/20 text-xs px-2 py-0.5 rounded-full">Investasi</span>';
            warnaUang = 'text-purple-400';
          }

          tbody.innerHTML += `
            <tr class="hover:bg-slate-800/30">
              <td class="p-3">${labelBadge}</td>
              <td class="p-3 font-medium text-slate-200">${item.catatan}</td>
              <td class="p-3 text-right font-bold ${warnaUang}">${formatRupiah(item.jumlah)}</td>
              <td class="p-3 text-center">
                <button onclick="hapusSatuItem(${index})" class="text-slate-500 hover:text-rose-400 font-bold px-2">✕</button>
              </td>
            </tr>
          `;
        });
      }

      // Simpan ke memori lokal browser
      localStorage.setItem('dompet_harian', JSON.stringify(dataTransaksi));
    }

    // Handle Form Submit
    document.getElementById('form-transaksi').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const jenis = document.getElementById('jenis').value;
      const jumlah = parseFloat(document.getElementById('jumlah').value);
      const catatan = document.getElementById('catatan').value;

      dataTransaksi.unshift({ jenis, jumlah, catatan });
      updateTampilan();

      // Reset Input
      document.getElementById('jumlah').value = '';
      document.getElementById('catatan').value = '';
    });

    // Hapus 1 Transaksi
    function hapusSatuItem(index) {
      dataTransaksi.splice(index, 1);
      updateTampilan();
    }

    // Reset Semua Data
    function resetSemuaData() {
      if (confirm("Yakin ingin menghapus seluruh riwayat transaksi?")) {
        dataTransaksi = [];
        updateTampilan();
      }
    }

    // Jalankan pertama kali
    updateTampilan();
  </script>
</body>
</html>
