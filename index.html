<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Monevia - Personal Finance</title>
  
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #020617; /* Latar belakang luar desktop */
      color: #ffffff;
      /* Menggunakan dvh agar tinggi layar laptop/HP selalu akurat 100% */
      height: 100dvh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    /* BINGKAI UTAMA APLIKASI */
    .app-container {
      width: 100%;
      height: 100dvh; /* Mengikuti tinggi dinamis layar fisik HP */
      background-color: #090d16;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ATURAN UNTUK LAPTOP / SCREEN LEBAR */
    @media screen and (min-width: 601px) {
      .app-container {
        max-width: 412px;
        height: 90dvh;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      }
    }

    .header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background-color: #090d16;
      flex-shrink: 0; /* Header dikunci agar ukurannya tidak mengecil */
    }
    
    /* ZONE KHUSUS SCROLL KONTEN */
    .main-content {
      flex: 1;
      overflow-y: auto; /* Hanya area ini yang boleh scroll */
      padding: 20px;
      -webkit-overflow-scrolling: touch;
    }
    
    .balance-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    
    /* TOMBOL TAMBAH MELAYANG TEPAT DI ATAS NAVBAR */
    .btn-add {
      width: 54px;
      height: 54px;
      background-color: #34d399;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(52,211,153,0.4);
      position: absolute;
      bottom: 45px; /* Disesuaikan agar menggantung pas di tengah navbar bawah */
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    
    /* NAVBAR BAWAH (DIKUNCI MATI MENEMPEL DI BAWAH APPS CONTAINER) */
    .bottom-nav {
      width: 100%;
      height: 70px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background-color: #020617;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-sizing: border-box;
      z-index: 99;
      flex-shrink: 0; /* Navbar dikunci agar tidak terdorong hilang */
    }
    
    .nav-item {
      background: none;
      border: none;
      color: #64748b;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }
    
    .nav-item.active { color: #34d399; }
    
    /* MODAL FORM */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.85);
      z-index: 999;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    
    .modal-box {
      width: 100%;
      background-color: #090d16;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      padding: 24px;
      box-sizing: border-box;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    @media screen and (min-width: 601px) {
      .modal-overlay { align-items: center; padding: 20px; }
      .modal-box { max-width: 370px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
    }

    .input-field {
      width: 100%;
      background-color: #0f172a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      color: white;
      font-size: 16px;
      margin-bottom: 12px;
      box-sizing: border-box;
      outline: none;
    }
    .btn-submit {
      width: 100%;
      background-color: #34d399;
      color: #020617;
      font-weight: bold;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 16px;
    }
    .btn-quick {
      background-color: #0f172a;
      border: 1px solid rgba(255,255,255,0.05);
      color: #cbd5e1;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
